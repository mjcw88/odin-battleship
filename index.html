<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project: Battleship | The Odin Project</title>
    <link rel="stylesheet" href="84bb4fc080631c2605f1.css">
<script defer src="main.js"></script></head>
<body>
    <dialog id="player-count-dialog">
        <div id="close-new-game-container" class="game-header">
            <button type="button" id="close-new-game-btn">X</button>
        </div>
        <form>
            <button type="submit" value="1">1 Player</button>
            <button type="submit" value="2">2 Players</button>
        </form>
    </dialog>
    <dialog id="player-one-dialog">
        <div class="game-header">
            <button id="player-one-back-btn" class="back-btn">Back</button>
        </div>
        <form>
            <div class="player-title-container">Player 1</div>
            <label for="player1-name">Enter your name:</label>
            <input type="text" id="player1-name" name="playerName" maxlength="16" placeholder="Player 1">
            <button type="submit">Done</button>
        </form>
    </dialog>
    <dialog id="player-two-dialog">
        <div class="game-header">
            <button id="player-two-back-btn" class="back-btn">Back</button>
        </div>
        <form>
            <div class="player-title-container">Player 2</div>
            <label for="player2-name">Enter your name:</label>
            <input type="text" id="player2-name" name="playerName" maxlength="16" placeholder="Player 2">
            <button type="submit">Done</button>
        </form>
    </dialog>
    <dialog id="cpu-dialog">
        <div class="game-header">
            <button id="cpu-back-btn" class="back-btn">Back</button>
        </div>
        <form>
            <div class="player-title-container-difficulty">Select difficulty:</div>
            <button type="submit" value="0">Very Easy</button>
            <button type="submit" value="1">Easy</button>
            <button type="submit" value="2">Medium</button>
            <button type="submit" value="3">Hard</button>
            <button type="submit" value="4">Very Hard</button>
        </form>
    </dialog>
    <dialog id="restart-game-dialog">
        <div class="game-header">
            <span>Restart Game</span>
            <button type="button" id="close-restart-game-btn" class="restart-game-btn">X</button>
        </div>
        <div class="restart-container-text">Are you sure?</div>
        <div class="restart-container">
            <button id="yes-restart-game-btn" class="restart-game-btn">Yes</button>
            <button id="no-restart-game-btn" class="restart-game-btn">No</button>
        </div>
    </dialog>
    <dialog id="start-turn-dialog">
        <div class="start-turn-text">Start Turn</div>
        <button id="start-turn-btn" class="multi-player-btn" data-action="start turn"></button>
    </dialog>
    <div class="header-container">
        <h1>Battleship</h1>
    </div>
    <div id="main-contents-container" hidden="true">
        <div id="top-buttons-container">
            <div id="restart-new-game-btns-container">
                <button id="restart-game-btn" class="single-player-btn multi-player-btn" data-action="restart">Restart Game</button>
                <button id="new-game-btn" class="single-player-btn multi-player-btn" data-action="new">New Game</button>
            </div>
            <div id="game-setup-btns-container">
                <button id="rotate-btn" class="single-player-btn multi-player-btn" data-action="rotate">Rotate</button>
                <button id="randomise-btn" class="single-player-btn multi-player-btn" data-action="randomise">Randomise</button>
            </div>
            <div id="start-game-btn-container">
                <button id="done-btn" class="multi-player-btn"data-action="done">Done</button>
                <button id="start-game-btn" class="single-player-btn multi-player-btn" data-action="start game">Start Game</button>
            </div>
        </div>
        <div id="ship-dock-main-container">
            <div id="main-board-contents"></div>
            <div id="ship-dock-container">
                <div class="dock-header">Shipyard</div>
                <div id="ship-container"></div>
            </div>
        </div>
        <div id="bottom-buttons-container">
            <div id="end-turn-btn-container">
                <button id="end-turn-btn" class="multi-player-btn" data-action="end turn">End Turn</button>
            </div>
        </div>
    </div>
</body>
</html>

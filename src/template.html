<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project: Battleship | The Odin Project</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="new-game-form-container">
        <dialog id="new-game-form">
            <div class="new-game-header">
                <h1>New Game</h1>
                <button type="button" id="close-new-game-btn" hidden="true">X</button>
            </div>
            <form>
                <div class="form-row player-name">
                    <label for="player1-name">Player 1</label>
                    <input type="text" id="player1-name" name="playerOneName" maxlength="16" placeholder="Name">
                </div>
                <div class="form-row player-name">
                    <label for="player2-name">Player 2</label>
                    <input type="text" id="player2-name" name="playerTwoName" maxlength="16" placeholder="Name" disabled>
                </div>
                <div class="form-row radio-btns">
                    <input type="radio" id="player2-cpu" name="playerCount" value="1" checked>
                    <label for="player2-cpu">CPU</label>
                    <input type="radio" id="player2-human" name="playerCount" value="2">
                    <label for="player2-human">Human</label>
                </div>
                <div class="form-row difficulty-btns">
                    <div class="form-row">Difficulty</div>
                    <input type="radio" id="difficulty-very-easy" name="difficulty" value="0">
                    <label for="difficulty-very-easy">Very Easy</label>
                    <input type="radio" id="difficulty-easy" name="difficulty" value="1">
                    <label for="difficulty-easy">Easy</label>
                    <input type="radio" id="difficulty-medium" name="difficulty" value="2" checked>
                    <label for="difficulty-medium">Medium</label>
                    <input type="radio" id="difficulty-hard" name="difficulty" value="3">
                    <label for="difficulty-hard">Hard</label>
                    <input type="radio" id="difficulty-very-hard" name="difficulty" value="4">
                    <label for="difficulty-very-hard">Very Hard</label>
                </div>
                <div class="form-row form-btns">
                    <button type="submit">Start Game</button>
                </div>
            </form>
        </dialog>
    </div>
    <div class="start-turn-container">
        <dialog id="start-turn-dialog">
            <h1>Start Turn</h1>
            <button id="start-turn-btn" class="multi-player-btn" data-action="start turn"></button>
        </dialog>
    </div>
    <h1>Battleship</h1>
    <div id="main-contents-container" hidden="true">
        <div id="buttons-container">
            <button id="rotate-btn" class="single-player-btn multi-player-btn" hidden="true" data-action="rotate">Rotate</button>
            <button id="randomise-btn" class="single-player-btn multi-player-btn" hidden="true" data-action="randomise">Randomise</button>
            <button id="done-btn" class="multi-player-btn" hidden="true" disabled="true" data-action="done">Done</button>
            <button id="start-game-btn" class="single-player-btn multi-player-btn" hidden="true" disabled="true" data-action="start game">Start Game</button>
            <button id="restart-game-btn" class="single-player-btn multi-player-btn" hidden="true" disabled="true" data-action="restart">Restart Game</button>
            <button id="new-game-btn" class="single-player-btn multi-player-btn" hidden="true" data-action="new">New Game</button>
        </div>
        <div id="ship-dock-main-container">
            <div id="ship-dock-container">
            </div>
            <div id="main-contents"></div>
        </div>
    </div>
</body>
</html>
